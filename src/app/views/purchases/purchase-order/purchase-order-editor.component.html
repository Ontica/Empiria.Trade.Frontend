<div class="fx-column-container-fill" [empNgSpinnerHost]="spinner">

  <emp-ng-spinner #spinner [visible]="submitted">

  </emp-ng-spinner>

  <div class="section-title"> Información general de la orden de compra </div>

  <emp-trade-purchase-order-header
    [isSaved]="isSaved"
    [order]="order"
    (purchaseOrderHeaderEvent)="onPurchaseOrderHeaderEvent($event)">

  </emp-trade-purchase-order-header>

</div>


<emp-ng-export-report-modal *ngIf="displayExportModal"
  title="Exportar orden de compra"
  message="Se generará la exportación a Excel de la orden de compra."
  [fileUrl]="fileUrl"
  (exportReportModalEvent)="onExportReportModalEvent($event)">

</emp-ng-export-report-modal>
